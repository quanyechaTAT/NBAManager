server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  application:
    name: nba-manager-backend
  datasource:
    url: jdbc:mysql://localhost:3306/nba_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: YOUR_DB_PASSWORD
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: "YOUR_JWT_SECRET_AT_LEAST_256_BITS"
    expiration-ms: 86400000
  cache:
    ttl-seconds: 1800
